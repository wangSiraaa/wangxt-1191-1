spring:
  application:
    name: explosive-management
  datasource:
    url: jdbc:h2:mem:explosivedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: mine-explosive-management-secret-key-2024-very-long-and-secure
  expiration: 86400000

logging:
  level:
    com.mine.explosive: DEBUG
    org.springframework.security: INFO
