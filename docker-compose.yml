version: '3.8'

services:
  backend:
    build: ./backend
    container_name: explosive-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=mine-explosive-management-super-secret-key-2024
      - JWT_EXPIRATION=86400000
    volumes:
      - h2-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: explosive-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  h2-data:
